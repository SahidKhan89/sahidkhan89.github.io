name: Post Market News to Social Media

on:
  schedule:
    - cron: '0 0,3,5,8,10,13,15,18,20,23 * * *'  # 10x/day, alternating 2-3 hour gaps
  workflow_dispatch:                               # allow manual trigger from the Actions tab

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write               # needed to commit the updated tracking file

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run posting script
        run: node scripts/post-news.mjs
        env:
          BACKEND_URL:           ${{ secrets.BACKEND_URL }}
          THREADS_ACCESS_TOKEN:  ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:       ${{ secrets.THREADS_USER_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}

      - name: Commit updated tracking file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_articles.json
          git diff --staged --quiet || git commit -m "chore: update posted articles [skip ci]"
          git pull --rebase origin main
          git push
