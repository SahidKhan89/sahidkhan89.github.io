name: Post Earnings Charts to Social Media

on:
  schedule:
    - cron: '0 9 * * 1-5'    # weekdays at 09:00 UTC (10 am BST / 9 am GMT)
    - cron: '0 13 * * 1-5'   # weekdays at 13:00 UTC (2 pm BST / 1 pm GMT)
    - cron: '0 22 * * 1-5'   # weekdays at 22:00 UTC (11 pm BST / 10 pm GMT)
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Force-post specific tickers (e.g. NVDA,AAPL) — skips EDGAR filing check'
        required: false
        default: ''

jobs:
  post-earnings-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate earnings charts
        run: python scripts/generate_earnings_charts.py
        env:
          FORCE_TICKERS: ${{ github.event.inputs.tickers }}

      - name: Commit charts to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached scripts/_post_manifest.json 2>/dev/null || true
          git add images/earnings/ .gitignore
          git diff --staged --quiet || git commit -m "chore: add earnings charts [skip ci]"
          git pull --rebase origin main
          git push

      - name: Post to social media
        run: python scripts/post_earnings_charts.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

      - name: Commit posted earnings tracking
        run: |
          git add data/posted_earnings.json
          git diff --staged --quiet || git commit -m "chore: update posted earnings [skip ci]"
          git pull --rebase origin main
          git push
