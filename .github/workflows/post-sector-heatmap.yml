name: Post Sector Heatmap to Social Media

on:
  schedule:
    - cron: '0 21 * * 1-5'   # weekdays at 21:00 UTC (10pm BST / 9pm GMT in winter) — after US market close
  workflow_dispatch:
    inputs:
      date:
        description: 'Force a specific date label (YYYY-MM-DD) — skips "last market day"'
        required: false
        default: ''

jobs:
  post-sector-heatmap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate sector heatmap card
        run: python scripts/generate_sector_heatmap_card.py
        env:
          FORCE_DATE: ${{ github.event.inputs.date }}

      - name: Generate sector heatmap reel
        run: python scripts/generate_sector_heatmap_reel.py
        env:
          FORCE_DATE: ${{ github.event.inputs.date }}

      - name: Commit card image and reel
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/sector-heatmap/ images/sector-heatmap-reel/
          git diff --staged --quiet || git commit -m "chore: add sector heatmap card + reel [skip ci]"
          git pull --rebase origin main
          git push

      - name: Post to social media
        run: python scripts/post_sector_heatmap.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID:            ${{ secrets.FB_PAGE_ID }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

      - name: Commit posted tracking
        run: |
          git add data/posted_sector_heatmap.json
          git diff --staged --quiet || git commit -m "chore: update posted sector heatmap [skip ci]"
          git pull --rebase origin main
          git push
