name: Post Movers to Social Media

on:
  schedule:
    - cron: '0 23 * * 1-5'   # weekdays at 23:00 UTC (12am BST / 11pm GMT in winter) — gives the ~20min data lag time to settle
  workflow_dispatch:
    inputs:
      date:
        description: 'Force a specific date label (YYYY-MM-DD) — skips "last market day"'
        required: false
        default: ''
      type:
        description: 'Force a specific post type — skips the random 1-of-2 pick'
        required: false
        type: choice
        options:
          - ''
          - movers
          - most_active

jobs:
  post-movers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate movers card
        run: python scripts/generate_movers_card.py
        env:
          FORCE_DATE: ${{ github.event.inputs.date }}
          FORCE_TYPE: ${{ github.event.inputs.type }}

      - name: Commit card image
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/movers/
          git diff --staged --quiet || git commit -m "chore: add movers card [skip ci]"
          git pull --rebase origin main
          git push

      - name: Post to social media
        run: python scripts/post_movers.py
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID:            ${{ secrets.FB_PAGE_ID }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

      - name: Commit posted tracking
        run: |
          git add data/posted_movers.json
          git diff --staged --quiet || git commit -m "chore: update posted movers [skip ci]"
          git pull --rebase origin main
          git push
