name: Post VIX Fear Gauge to Social Media

on:
  schedule:
    - cron: '0 14 * * 1,3,5'   # Mon/Wed/Fri at 14:00 UTC (3pm BST / 2pm GMT in winter) — mid US trading session
  workflow_dispatch:
    inputs:
      date:
        description: 'Force a specific date label (YYYY-MM-DD) — skips "last market day"'
        required: false
        default: ''

jobs:
  post-vix-gauge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate VIX gauge card
        run: python scripts/generate_vix_gauge_card.py
        env:
          FORCE_DATE: ${{ github.event.inputs.date }}

      - name: Commit card image
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/vix-gauge/
          git diff --staged --quiet || git commit -m "chore: add VIX gauge card [skip ci]"
          git pull --rebase origin main
          git push

      - name: Post to social media
        run: python scripts/post_vix_gauge.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID:            ${{ secrets.FB_PAGE_ID }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

      - name: Commit posted tracking
        run: |
          git add data/posted_vix_gauge.json
          git diff --staged --quiet || git commit -m "chore: update posted VIX gauge [skip ci]"
          git pull --rebase origin main
          git push
